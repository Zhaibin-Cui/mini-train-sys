run:
  name: ddp_llm
  seed: 1337
backend:
  ops: triton
  parallel: ddp
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  fused: null
lr_scheduler:
  schedule: cosine
  warmup_steps: 100
  decay_steps: null
  min_lr_ratio: 0.1
train:
  batch_size: 8
  max_steps: null
  epochs: 10
  log_interval: 10
  use_fused_loss: true
  precision: bf16
  grad_clip_norm: 1.0
  checkpoint_every_epochs: 2
  checkpoint_dir: checkpoints
  save_final_checkpoint: true
  resume_from: null
data:
  source: random
  path: null
  num_tokens: 100000
  shuffle: true
logging:
  console: true
  tensorboard: true
  log_dir: runs
  flush_secs: 10
distributed:
  bucket_cap_mb: 25
  gradient_as_bucket_view: true
