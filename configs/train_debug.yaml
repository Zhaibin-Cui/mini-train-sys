run:
  name: debug
  seed: 1337
backend:
  ops: torch
parallel:
  strategy: single
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  fused: null
lr_scheduler:
  schedule: constant
  warmup_steps: 0
  decay_steps: null
  min_lr_ratio: 0.1
train:
  batch_size: 2
  max_steps: 10
  epochs: null
  log_interval: 1
  use_fused_loss: false
  precision: auto
  grad_clip_norm: 5.0
checkpoint:
  every_epochs: null
  directory: checkpoints
  save_final: false
  resume_from: null
data:
  source: random
  path: null
  num_tokens: 4096
  shuffle: true
  shuffle_window: 1024
  max_open_shards: 8
  # Deliberately synchronous: process startup dominates this tiny CPU/debug run.
  num_workers: 0
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: false
  drop_last: true
logging:
  console: true
  tensorboard: false
  log_dir: runs
  flush_secs: 10
