backend:
  ops: triton
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  fused: true
lr_scheduler:
  schedule: cosine
  warmup_steps: 100
  decay_steps: null
  min_lr_ratio: 0.1
train:
  # Safe weak-scaling baseline for one 24 GB RTX 4090; capacity benchmark
  # determines the largest stable local batch for a concrete model/kernel.
  batch_size: 4
  max_steps: null
  epochs: 10
  log_interval: 10
  use_fused_loss: true
  precision: bf16
  grad_clip_norm: 5.0
checkpoint:
  every_epochs: 1
  keep_last: 2
  keep_safety: 1
  safety_every_epochs: 10
  keep_model_exports: 1
  directory: checkpoints
  save_final: true
  resume_from: null
  export_model: true
  cpu_offload: true
data:
  source: random
  path: null
  num_tokens: 4000000
  shuffle: true
  packing: contiguous
  shuffle_window: 1024
  max_open_shards: 8
  # null = topology-aware allocation from one node-wide CPU budget.
  num_workers: null
  worker_budget: 32
  max_workers_per_rank: 4
  worker_cpu_affinity: true
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true
  drop_last: true
logging:
  console: true
  tensorboard: true
  jsonl: true
  log_dir: runs
  flush_secs: 10
