run:
  name: single_torch_smoke_gpu
  seed: 1337
backend:
  ops: torch
  parallel: single
train:
  batch_size: 1
  lr: 0.0003
  weight_decay: 0.1
  max_steps: 1
  log_interval: 1
  use_fused_loss: false
  precision: bf16
  grad_clip_norm: 1.0
data:
  source: random
  num_tokens: 100000
  shuffle: true
logging:
  console: true
  tensorboard: false
  log_dir: runs
  flush_secs: 10
