gate:
  threshold: 0.90
  examples: 10000
  batch_size: 128
  max_new_tokens: 16
  sample_biographies: 12

# 四卡采用任务并行：每张 GPU 同时训练一个独立 probe。服务器 batch benchmark
# 完成后只需更新这里或使用同名 CLI 参数，不需要修改训练代码。
runtime:
  training_batch_sizes:
    p: 128
    q: 768
  validation_batch_sizes:
    p: 512
    q: 6144
  log_interval_steps: 100
  heartbeat_seconds: 10
  checkpoint_interval_steps: 1000
  evaluate_train: true

stages:
  smoke:
    steps: 500
    requires: null
    tasks:
      - kind: p
        attribute: university
        target: whole
      - kind: q
        attribute: university
        target: whole

  pilot:
    steps: 3000
    requires: smoke
    tasks: all

  formal:
    # Pilot-held-out first-token tasks saturated by 3k steps; whole-attribute
    # tasks retained large generalization gaps. Give first tasks a small safety
    # margin and whole tasks 4x the pilot training, while keeping the server's
    # throughput-optimal P=128/Q=768 batches.
    steps:
      p_first: 4000
      p_whole: 12000
      q_first: 4000
      q_whole: 12000
    requires: pilot
    tasks: all
