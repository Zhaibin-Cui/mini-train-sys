extends: single_fsdp_4gpu.yaml
run: {name: synbios_moe_single_fsdp_4gpu_validation}
train:
  # Keep this identical to the formal batch while isolating checkpoint artifacts.
  log_interval: 1
checkpoint:
  directory: artifacts/validation/synbios_moe/checkpoints
  every_epochs: null
  keep_last: 2
  keep_safety: 0
  # Stability probes must not spend tens of seconds writing a multi-GB formal
  # checkpoint. Full save/resume correctness has its own validation gate.
  save_final: false
  export_model: false
  export_model_every_epochs: null
logging:
  log_dir: artifacts/validation/synbios_moe/runs
